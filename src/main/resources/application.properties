# =========================================================
# ACTIVE PROFILE
# =========================================================
spring.profiles.active=local

# =========================================================
# MONGODB CONFIGURATION (reporte_db compartida con microservicio-reporte)
# =========================================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=reporte_db
spring.data.mongodb.username=admin
spring.data.mongodb.password=password123
spring.data.mongodb.authentication-database=admin

# =========================================================
# RESILIENCE4J - CIRCUIT BREAKER
# =========================================================
# capacidad-client
resilience4j.circuitbreaker.instances.capacidad-client.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.capacidad-client.sliding-window-size=10
resilience4j.circuitbreaker.instances.capacidad-client.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.capacidad-client.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.capacidad-client.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.capacidad-client.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.capacidad-client.register-health-indicator=true

